<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Website maintenance</title>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        html {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Poppins', sans-serif !important;
            background-color: #FFFFFF;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            line-height: 1.2em;
            font-size: 16px;
        }

        .wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 1170px;
            margin: auto;
            flex-direction: column;
            flex-wrap: wrap;
            text-align: center;
        }

        .wrapper .logo {
            margin-bottom: 30px;
            max-width: 400px;
        }

        .wrapper .page-heading {
            width: 100%;
            margin-bottom: 15px;
            font-size: 52px;
            line-height: 62px;
            font-weight: 300;
        }

        .wrapper .desc {
            width: 100%;
            font-size: 20px;
            max-width: 400px;
            line-height: 30px;
        }

        .wrapper .quote {
            font-style: italic;
        }

        .wrapper .contact {
            display: inline-block;
            background-color: #136ACD;
            color: #ffffff;
            padding: 15px 25px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 15px;
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <div class="logo">
            <img src="../../finance-customer-frontend/src/assets/logo/finance-logo.png" alt="Finance">
        </div>
        <h2 class="page-heading">The platform is currently down for scheduled maintenance on Friday, March 19, 2021,
            between 12am to 6am EST.</h2>
        <div class="desc">
            <p>We do apologize for the inconvenience. Please check back soon.</p>
        </div>
        <!-- <a href="https://status.payyit.com/en/" class="contact">Check status</a> -->
        <a class="contact">Check status</a>
    </div>
</body>

</html>
